<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>
      <div class="header-title">
        <ion-icon name="checkmark-done-circle" color="primary"></ion-icon>
        <span>To-Do List</span>
      </div>
    </ion-title>
      
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Greeting -->
  <div class="greeting-section">
    <h2>Hola, Bienvenido</h2>
  </div>

  <!-- Summary Cards -->
  <div class="summary-cards">
    <ion-card class="summary-card total">
      <ion-card-content>
        <ion-icon name="list-outline"></ion-icon>
        <h3>{{this.dashTotal.total}}</h3>
        <p>Total</p>
      </ion-card-content>
    </ion-card>
    <ion-card class="summary-card pending">
      <ion-card-content>
        <ion-icon name="time-outline"></ion-icon>
        <h3>{{this.dashTotal.pending}}</h3>
        <p>Pendientes</p>
      </ion-card-content>
    </ion-card>
    <ion-card class="summary-card completed">
      <ion-card-content>
        <ion-icon name="checkmark-circle-outline"></ion-icon>
        <h3>{{this.dashTotal.completed}}</h3>
        <p>Completadas</p>
      </ion-card-content>
    </ion-card>
  </div>

  <!-- Categories -->
  <div class="section-header">
    <h3>Categorías</h3>
  </div>
  <app-category-list></app-category-list>

  <!-- Tasks -->
  <div class="section-header">
    <h3>Tus Tareas</h3>
  </div>
  <app-task-list></app-task-list>

  <!-- FAB Button -->
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button id="open-task-modal" color="primary" class="main-fab">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <!-- Task Modal Integration -->
  <ion-modal trigger="open-task-modal" [initialBreakpoint]="0.75" [breakpoints]="[0, 0.75, 1]" class="custom-bottom-sheet" (ionModalDidDismiss)="onModalDismiss($event)">
    <ng-template>
      <app-task-modal></app-task-modal>
    </ng-template>
  </ion-modal>
</ion-content>
